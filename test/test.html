<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
<meta charset="utf-8">
</head>
<body>
    <h2> Đăng ký môn thi tốt nghiệp </h2>
    <form>
        <fieldset>
            <label for="name">
                Họ và tên :
            </label>
            <input type="text" id="name">
            <br> <br>
            <label for="CanCuoc"> 
                CCCD : 
             </label>
            <input type="number" id="CanCuoc">
            <br> <br>
            <label for="NgaySinh"> Ngày Sinh :</label>
            <input type="date" name="NgaySinh">
            <br> <br>
            <label for="Gender"> Giới Tính : </label>
            <input type="radio" name="gender" value="Nam"> Nam
            <input type="radio" name="gender" value="Nu"> Nữ
            <input type="radio" name="gender" value="Khac"> Khác
            <br> <br>
            <label for="MonThi"> Môn Thi : </label> <br>
            <input type="checkbox" name="monthi" value="Toan"> Toán
            <input type="checkbox" name="monthi" value="Van"> Văn
            <input type="checkbox" name="monthi" value="Anh"> Anh
            <br> <br>
            <label for="Tohop"> Tổ hợp : </label>
            <select id="Tohop" name="Tohop">
                <option value="Toan_Ly_Hoa"> Toán - Lý - Hóa </option>
                <option value="Van_Su_Dia"> Văn - Sử - Địa </option>
                <option value="Toan_Hoa_Sinh"> Toán - Hóa - Sinh </option>
            </select>
            <br> <br>
            <input type="submit" value="Gửi thông tin"> 
        </fieldset>
    </form>
</body>
</html>
